name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push auth-service
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest \
          -f auth-service/dockerfile \
          . \
          --push

      - name: Build & push api-gateway
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest \
          -f api-gateway/dockerfile \
          . \
          --push

      - name: Push auth-service
        run: docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      - name: Push api-gateway
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
