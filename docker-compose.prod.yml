version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - auth-service

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    restart: always
    ports:
      - "3001:3000"
      - "50051:50051"
    env_file:
      - ./auth-service/.env.production
    depends_on:
      - auth-db

  auth-db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 0248qazwsx
      POSTGRES_DB: auth_db
    volumes:
      - auth_data:/var/lib/postgresql/data

volumes:
  auth_data: